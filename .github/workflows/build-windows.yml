name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller packaging/DescribePDF-win.spec --noconfirm

      - name: Smoke test the built app
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\DescribePDF\DescribePDF.exe" -PassThru `
            -RedirectStandardOutput app.log -RedirectStandardError app-err.log
          $ok = $false
          foreach ($i in 1..45) {
            Start-Sleep -Seconds 2
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:7860/" -UseBasicParsing -TimeoutSec 3
              if ($resp.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
            if ($proc.HasExited) { break }
          }
          $configOk = $false
          if ($ok) {
            try {
              $config = Invoke-WebRequest -Uri "http://127.0.0.1:7860/config" -UseBasicParsing -TimeoutSec 10
              $content = [string]$config.Content
              Write-Output "Config payload: $($content.Length) chars"
              if ($content -match '"Prompts"' -and $content -match '"Batch"') {
                $configOk = $true
              } else {
                Write-Output "Config served but expected tab labels not found."
              }
            } catch {
              Write-Output "Config fetch/parse failed: $_"
            }
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Get-Content app.log, app-err.log -ErrorAction SilentlyContinue
          if (-not $ok) {
            Write-Error "App did not serve the UI on port 7860."
            exit 1
          }
          if (-not $configOk) {
            Write-Error "UI served but config check failed."
            exit 1
          }
          Write-Output "Smoke test passed: UI served with expected tabs."

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: DescribePDF-windows
          path: dist/DescribePDF/
          if-no-files-found: error
